name: myspicemarket
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  http: ^1.6.0
  provider: ^6.1.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.12.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_webrtc: ^1.5.2
  socket_io_client: ^3.1.6
  device_preview_plus: ^2.8.2
  firebase_core: ^3.15.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4   # ✅ use the latest available version

flutter:
  assets:
    - assets/images/
  uses-material-design: true

# ✅ Correct configuration for launcher icons
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
